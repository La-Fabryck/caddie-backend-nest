services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - pgcaddie:/var/lib/postgresql
    networks:
      - backend

  backend:
    build:
      context: ./
      dockerfile: ./docker/app/local/Dockerfile
    volumes:
      - '.:/app'
    ports:
      - '3001:3001' # Nest
      - '9229:9229' # Debug
      - '9230:9230' # Debug Tests
    depends_on:
      - postgres
    working_dir: /app
    command: ['npm', 'run', 'start:debug']
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - .env
    networks:
      - caddie_network
      - backend

networks:
  caddie_network:
    external: true
  backend:

volumes:
  pgcaddie: