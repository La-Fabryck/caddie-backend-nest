services:
  postgres:
    image: postgres:18-alpine
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - pgcaddie:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    networks:
      - backend

  backend:
    build:
      context: ../../..
      dockerfile: docker/app/prod/Dockerfile
    ports:
      - '3001:3001'
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../../.env
    networks:
      - caddie_network
      - backend

networks:
  caddie_network:
    external: true
  backend:

volumes:
  pgcaddie:
